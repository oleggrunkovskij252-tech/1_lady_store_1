<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин женской одежды</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: #f8f8f8;
    }

    header {
        background: #ff4081;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
    }

    nav {
        background: #fff;
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 15px 0;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav a {
        text-decoration: none;
        color: #333;
        font-weight: bold;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
    }

    .card {
        background: white;
        width: 250px;
        margin: 15px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
        padding: 15px;
        transition: transform 0.2s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        border-radius: 10px;
    }

    .card h3 {
        margin: 10px 0;
        font-size: 20px;
    }

    .price {
        color: #ff4081;
        font-size: 18px;
        margin: 10px 0;
    }

    button {
        background: #ff4081;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 5px;
        transition: background 0.3s;
    }

    button:hover {
        background: #e73370;
    }

    footer {
        background: #222;
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 30px;
    }

    @media (max-width: 600px) {
        .card {
            width: 90%;
        }
    }
</style>
</head>
<body>

<header>Стильная Женская Одежда</header>

<nav>
    <a href="#">Главная</a>
    <a href="#">Новинки</a>
    <a href="#">Популярное</a>
    <a href="#">Контакты</a>
</nav>

<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/250x300?text=Платье" alt="Платье">
        <h3>Летнее платье</h3>
        <p class="price">1200 грн</p>
        <button onclick="order('Летнее платье')">Заказать</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300?text=Худи" alt="Худи">
        <h3>Стильное худи</h3>
        <p class="price">850 грн</p>
        <button onclick="order('Стильное худи')">Заказать</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300?text=Костюм" alt="Костюм">
        <h3>Спортивный костюм</h3>
        <p class="price">1400 грн</p>
        <button onclick="order('Спортивный костюм')">Заказать</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300?text=Блузка" alt="Блузка">
        <h3>Элегантная блузка</h3>
        <p class="price">700 грн</p>
        <button onclick="order('Элегантная блузка')">Заказать</button>
    </div>
</div>

<footer>
Доставка: Новая Почта | Укрпочта | Наложенный платеж | Оплата картой
</footer>

<script>
function order(item){
    alert("Спасибо за заказ товара: " + item + "!\nМы скоро свяжемся с вами.");
}
</script>

</body>
</html>
